[profile.default]
src = "contracts"
out = "out"
libs = ["../node_modules", "lib"]
test = "test-foundry"
script = "script"
solc_version = "0.8.20"

# Optimizer
optimizer = true
optimizer_runs = 200
via_ir = true

# Testing
gas_reports = ["*"]
ffi = false
fs_permissions = [{ access = "read-write", path = "./" }]

# Remappings for dependencies (using parent node_modules for Turborepo workspace)
remappings = [
    "@openzeppelin/contracts/=../node_modules/@openzeppelin/contracts/",
    "@chainlink/contracts/=../node_modules/@chainlink/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1000 }

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_MAINNET_RPC}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }

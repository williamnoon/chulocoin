# Docker Compose for ChuloBots Production Deployment
version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:16-alpine
    container_name: chulobots-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chulobots-prod-network
    restart: always

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: chulobots-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chulobots-prod-network
    restart: always

  # Backend API (Production)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chulobots-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: 3001
      # Arbitrum RPC
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL}
      ARBISCAN_API_KEY: ${ARBISCAN_API_KEY}
      # Contract addresses
      CHULO_TOKEN_ADDRESS: ${CHULO_TOKEN_ADDRESS}
      SIGNAL_REGISTRY_ADDRESS: ${SIGNAL_REGISTRY_ADDRESS}
      TIER_NFT_ADDRESS: ${TIER_NFT_ADDRESS}
      VALIDATOR_STAKING_ADDRESS: ${VALIDATOR_STAKING_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chulobots-prod-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend WebApp (Production)
  webapp:
    build:
      context: ./frontend/webapp
      dockerfile: Dockerfile
    container_name: chulobots-webapp-prod
    environment:
      VITE_API_URL: ${API_URL}
    depends_on:
      - backend
    networks:
      - chulobots-prod-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Landing Page (Production)
  landing:
    build:
      context: ./frontend/landing
      dockerfile: Dockerfile
    container_name: chulobots-landing-prod
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    networks:
      - chulobots-prod-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: chulobots-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - webapp
      - landing
    networks:
      - chulobots-prod-network
    restart: always

networks:
  chulobots-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  nginx_logs:

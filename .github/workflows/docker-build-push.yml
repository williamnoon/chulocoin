name: Build and Push Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main, staging]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.1.0 or latest)'
        required: true
        default: 'latest'

env:
  DOCKER_USERNAME: willnoon

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    # Only run if CI passed or if triggered manually/by tag
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Determine version and environment
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi

          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            ENV="production"
          else
            ENV="staging"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} for environment: ${ENV}"

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/chulobots-backend:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/chulobots-backend:${{ steps.vars.outputs.environment }}-latest
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-backend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-backend:buildcache,mode=max

      - name: Build and push Webapp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/webapp/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/chulobots-webapp:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/chulobots-webapp:${{ steps.vars.outputs.environment }}-latest
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-webapp:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-webapp:buildcache,mode=max

      - name: Build and push Landing image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/landing/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/chulobots-landing:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/chulobots-landing:${{ steps.vars.outputs.environment }}-latest
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-landing:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-landing:buildcache,mode=max

      - name: Build and push CLI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cli/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/chulobots-cli:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/chulobots-cli:${{ steps.vars.outputs.environment }}-latest
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-cli:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-cli:buildcache,mode=max

      - name: Build and push Bot Executor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bot-executor/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/chulobots-bot-executor:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/chulobots-bot-executor:${{ steps.vars.outputs.environment }}-latest
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-bot-executor:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/chulobots-bot-executor:buildcache,mode=max

      - name: Create deployment summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ steps.vars.outputs.environment }}**" >> $GITHUB_STEP_SUMMARY
          echo "Version: **${{ steps.vars.outputs.version }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/chulobots-backend:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/chulobots-webapp:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/chulobots-landing:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/chulobots-cli:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/chulobots-bot-executor:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull commands:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_USERNAME }}/chulobots-backend:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_USERNAME }}/chulobots-webapp:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_USERNAME }}/chulobots-landing:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_USERNAME }}/chulobots-cli:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_USERNAME }}/chulobots-bot-executor:${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

# Docker Compose for deploying ChuloBots from Docker Hub images
# Usage: docker-compose -f docker-compose.deploy.yml up -d
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chulobots-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-chulobots}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chulobots-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chulobots-redis
    command: ${REDIS_PASSWORD:+redis-server --requirepass $REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chulobots-network
    restart: unless-stopped

  # Backend API (from Docker Hub)
  backend:
    image: ${DOCKER_USERNAME:-willnoon}/chulobots-backend:${ENVIRONMENT:-staging}-${VERSION:-latest}
    container_name: chulobots-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/chulobots}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: 3001
      # Arbitrum
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL}
      ARBISCAN_API_KEY: ${ARBISCAN_API_KEY}
      # Contract addresses
      CHULO_TOKEN_ADDRESS: ${CHULO_TOKEN_ADDRESS}
      SIGNAL_REGISTRY_ADDRESS: ${SIGNAL_REGISTRY_ADDRESS}
      TIER_NFT_ADDRESS: ${TIER_NFT_ADDRESS}
      VALIDATOR_STAKING_ADDRESS: ${VALIDATOR_STAKING_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chulobots-network
    restart: unless-stopped

  # Frontend WebApp (from Docker Hub)
  webapp:
    image: ${DOCKER_USERNAME:-willnoon}/chulobots-webapp:${ENVIRONMENT:-staging}-${VERSION:-latest}
    container_name: chulobots-webapp
    ports:
      - "${WEBAPP_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    depends_on:
      - backend
    networks:
      - chulobots-network
    restart: unless-stopped

  # Landing Page (from Docker Hub)
  landing:
    image: ${DOCKER_USERNAME:-willnoon}/chulobots-landing:${ENVIRONMENT:-staging}-${VERSION:-latest}
    container_name: chulobots-landing
    ports:
      - "${LANDING_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:80}
    networks:
      - chulobots-network
    restart: unless-stopped

networks:
  chulobots-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

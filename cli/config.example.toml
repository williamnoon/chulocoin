# ChuloBots CLI Configuration Example
# Copy this file to:
#   - Linux/macOS: ~/.config/chulobots/config.toml
#   - Windows: %APPDATA%\chulobots\config.toml

[wallet]
# Your Ethereum private key (keep this secret!)
# Can also be set via environment variable: CHULO_PRIVATE_KEY
private_key = ""
# Alternative: use environment variable name
private_key_env = "CHULO_PRIVATE_KEY"

[network]
# Arbitrum Sepolia RPC endpoint (testnet)
rpc_url = "https://sepolia-rollup.arbitrum.io/rpc"
# Chain ID for Arbitrum Sepolia
chain_id = 421614

# Alternative: Arbitrum One (mainnet)
# rpc_url = "https://arb1.arbitrum.io/rpc"
# chain_id = 42161

[contracts]
# CHULO token contract address (ERC-20)
chulo_address = "0x..."

# SignalRegistry contract address
signal_registry_address = "0x..."

# ValidatorStaking contract address (optional, for validators)
validator_staking_address = "0x..."

# Backend WebSocket endpoint
backend_ws = "wss://api.chulobots.com/ws"

# Backend HTTP API endpoint
backend_api = "https://api.chulobots.com/v1"

[mining]
# Auto-start mining on launch
auto_start = false

# Minimum validation confidence threshold (0.0 - 1.0)
validation_threshold = 0.8

# Maximum signals to process per session (0 = unlimited)
max_signals = 0

# Polling interval in seconds
poll_interval = 5

# Strategy configuration
enabled_strategies = ["bull_flag", "rsi_oversold"]

# Check interval in seconds (how often to run strategies)
check_interval_seconds = 300

# Python executable path
python_path = "python3"

# Strategies directory (relative to CLI or absolute)
strategies_dir = "../strategies"

# Market data source
market_data_source = "coingecko"  # Options: coingecko, binance, chainlink

# Assets to monitor
monitored_assets = ["bitcoin", "ethereum"]

[ui]
# Enable colors in terminal
colors = true

# Refresh rate in milliseconds
refresh_rate = 100

# Show debug information
debug = false

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log to file (optional)
# file = "~/.local/share/chulobots/chulobots.log"

[advanced]
# Gas price multiplier (1.0 = normal, 1.5 = 50% higher)
gas_multiplier = 1.0

# Transaction timeout in seconds
tx_timeout = 60

# Retry failed transactions
retry_transactions = true

# Maximum retry attempts
max_retries = 3
